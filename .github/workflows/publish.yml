name: Publish

# Publishes the `ai-whisper` package (packages/cli) to npm when a v* tag is
# pushed. Bump packages/cli/package.json version, commit, then tag v<version>
# and push the tag. Requires an NPM_TOKEN repo secret (npm automation token).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -s test

      - name: Publish to npm
        working-directory: packages/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing ai-whisper@$VERSION"
          if [[ "$VERSION" == *"-"* ]]; then
            pnpm publish --access public --no-git-checks --tag beta
          else
            pnpm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
