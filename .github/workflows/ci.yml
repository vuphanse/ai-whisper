name: ci

on:
  push:
    branches: [master]

jobs:
  test:
    name: pnpm test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm -s test
